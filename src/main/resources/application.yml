spring:
  application:
    name: task-manager

  # JPA設定
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2データベース
  datasource:
    url: jdbc:h2:mem:taskdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # SQL初期化
  sql:
    init:
      mode: always

  # 国際化
  messages:
    basename: messages
    encoding: UTF-8

  # H2コンソール
  h2:
    console:
      enabled: false

server:
  port: 8080
  max-http-form-content-size: 2MB
  tomcat:
    max-http-header-size: 48KB

---
# 開発プロファイル
spring:
  config:
    activate:
      on-profile: dev

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    show-sql: true

logging:
  level:
    com.example.taskmanager: DEBUG
    org.springframework.jdbc: DEBUG
