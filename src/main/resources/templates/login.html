<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Login - Task Manager')}">
</head>
<body>

<div class="container" style="max-width: 400px; margin-top: 4rem;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 1.5rem; color: #1e293b;">Task Manager Login</h2>

        <div th:if="${param.error}" class="flash-message flash-error">
            ユーザー名またはパスワードが正しくありません。
        </div>
        <div th:if="${param.logout}" class="flash-message flash-success">
            ログアウトしました。
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username" class="form-label">ユーザー名</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="ユーザー名を入力" required autofocus>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">パスワード</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="パスワードを入力" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">
                ログイン
            </button>
        </form>

        <div style="margin-top: 1.5rem; padding: 1rem; background: #f8fafc; border-radius: 6px; border: 1px solid #e2e8f0;">
            <p style="font-size: 0.8rem; font-weight: 600; color: #64748b; margin-bottom: 0.5rem;">テスト用アカウント</p>
            <table style="font-size: 0.8rem; width: 100%; color: #475569;">
                <tr><td><strong>admin</strong> / admin123</td><td style="text-align: right;">ADMIN</td></tr>
                <tr><td><strong>user1</strong> / user123</td><td style="text-align: right;">USER</td></tr>
                <tr><td><strong>user2</strong> / user123</td><td style="text-align: right;">USER</td></tr>
            </table>
        </div>
    </div>
</div>

</body>
</html>
