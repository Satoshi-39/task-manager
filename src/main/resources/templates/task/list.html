<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Task List - Task Manager')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: flash}"></div>

<main class="container">
    <div class="page-header">
        <h1>Task List</h1>
        <a th:href="@{/tasks/new}" class="btn btn-primary">New Task</a>
    </div>

    <!-- Search Form -->
    <form th:action="@{/tasks}" method="get" class="form-inline">
        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status" class="form-control">
                <option value="">All</option>
                <option th:each="s : ${T(com.example.taskmanager.domain.enums.TaskStatus).values()}"
                        th:value="${s}" th:text="${s.displayName}"
                        th:selected="${criteria.status != null && criteria.status == s}">
                </option>
            </select>
        </div>
        <div class="form-group">
            <label for="priority">Priority</label>
            <select id="priority" name="priority" class="form-control">
                <option value="">All</option>
                <option th:each="p : ${T(com.example.taskmanager.domain.enums.TaskPriority).values()}"
                        th:value="${p}" th:text="${p.displayName}"
                        th:selected="${criteria.priority != null && criteria.priority == p}">
                </option>
            </select>
        </div>
        <div class="form-group">
            <label for="keyword">Keyword</label>
            <input type="text" id="keyword" name="keyword" class="form-control"
                   th:value="${criteria.keyword}" placeholder="Search...">
        </div>
        <div class="form-group">
            <label class="form-check">
                <input type="checkbox" name="overdue" value="true"
                       th:checked="${criteria.overdue != null && criteria.overdue}">
                <span>Overdue only</span>
            </label>
        </div>
        <div class="form-group">
            <button type="submit" class="btn btn-primary">Search</button>
            <a th:href="@{/tasks}" class="btn btn-outline">Clear</a>
        </div>
    </form>

    <!-- Task Table -->
    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>Task No.</th>
                <th>Title</th>
                <th>Status</th>
                <th>Priority</th>
                <th>Due Date</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="task : ${tasks}">
                <td th:text="${task.taskNumber}">TASK-001</td>
                <td>
                    <a th:href="@{/tasks/{id}(id=${task.id})}" th:text="${task.title}">Title</a>
                </td>
                <td>
                    <span class="badge"
                          th:classappend="${task.status.name() == 'TODO'} ? 'badge-todo' :
                                          (${task.status.name() == 'IN_PROGRESS'} ? 'badge-in-progress' :
                                          (${task.status.name() == 'DONE'} ? 'badge-done' : 'badge-cancelled'))"
                          th:text="${task.status.displayName}">Status</span>
                </td>
                <td>
                    <span class="badge"
                          th:classappend="${task.priority.name() == 'LOW'} ? 'badge-low' :
                                          (${task.priority.name() == 'MEDIUM'} ? 'badge-medium' :
                                          (${task.priority.name() == 'HIGH'} ? 'badge-high' : 'badge-critical'))"
                          th:text="${task.priority.displayName}">Priority</span>
                </td>
                <td th:text="${task.dueDate != null} ? ${#temporals.format(task.dueDate, 'yyyy/MM/dd HH:mm')} : '-'">-</td>
                <td>
                    <a th:href="@{/tasks/{id}/edit(id=${task.id})}" class="btn btn-outline btn-sm">Edit</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(tasks)}">
                <td colspan="6" style="text-align: center; padding: 2rem; color: #64748b;">
                    No tasks found.
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
